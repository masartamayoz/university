<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b"/>
      <stop offset="100%" style="stop-color:#2552a0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gold accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#f5b800"/>
  <rect x="0" y="624" width="1200" height="6" fill="#f5b800"/>

  <!-- Side decoration -->
  <rect x="0" y="0" width="8" height="630" fill="#f5b800" opacity="0.5"/>
  <rect x="1192" y="0" width="8" height="630" fill="#f5b800" opacity="0.5"/>

  <!-- Big icon -->
  <text x="600" y="200" font-size="100" text-anchor="middle" font-family="Arial">🎓</text>

  <!-- Site name -->
  <text x="600" y="290" font-size="62" font-weight="bold" fill="#f5b800"
        text-anchor="middle" font-family="Cairo, Arial" direction="rtl">المسار الجامعي</text>

  <!-- Tagline -->
  <text x="600" y="360" font-size="30" fill="rgba(255,255,255,0.85)"
        text-anchor="middle" font-family="Cairo, Arial" direction="rtl">بوابة التوجيه الجامعي لناجحي الباكالوريا 2026</text>

  <!-- Stats row -->
  <rect x="200" y="410" width="240" height="90" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="320" y="448" font-size="36" font-weight="bold" fill="#f5b800" text-anchor="middle" font-family="Cairo, Arial">688</text>
  <text x="320" y="483" font-size="18" fill="rgba(255,255,255,0.75)" text-anchor="middle" font-family="Cairo, Arial" direction="rtl">اختصاص جامعي</text>

  <rect x="480" y="410" width="240" height="90" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="600" y="448" font-size="36" font-weight="bold" fill="#f5b800" text-anchor="middle" font-family="Cairo, Arial">12</text>
  <text x="600" y="483" font-size="18" fill="rgba(255,255,255,0.75)" text-anchor="middle" font-family="Cairo, Arial" direction="rtl">جامعة تونسية</text>

  <rect x="760" y="410" width="240" height="90" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="880" y="448" font-size="36" font-weight="bold" fill="#f5b800" text-anchor="middle" font-family="Cairo, Arial">2026</text>
  <text x="880" y="483" font-size="18" fill="rgba(255,255,255,0.75)" text-anchor="middle" font-family="Cairo, Arial" direction="rtl">بكالوريا</text>

  <!-- URL -->
  <text x="600" y="580" font-size="20" fill="rgba(255,255,255,0.55)"
        text-anchor="middle" font-family="monospace">university.masartamayoz.com</text>
</svg>
